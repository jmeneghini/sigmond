# Sigmond Configuration
[build]
skip_query = false
skip_batch = false
precision = "double"
numbers = "complex"
default_file_format = "hdf5"
enable_minuit = false
enable_grace = false
verbose = false
build_jobs = 16           # Number of parallel build jobs (0 = auto-detect)
batch_install_dir = ""     # Custom install directory for sigmond_batch (empty = default bin/)
query_install_dir = ""     # Custom install directory for sigmond_query (empty = default bin/)
disable_rpath_macos = true # Disable @rpath and use absolute paths on macOS (helpful for conda environments)

[libraries]
# Manual library paths (only specify if auto-detection fails)

[libraries.hdf5]
hdf5_root = ""

[libraries.lapack]
include_dirs = []
library_dirs = []

[libraries.accelerate]
framework_dirs = []

[libraries.minuit2]
include_dirs = []
library_dirs = []

[libraries.grace]
include_dirs = []
library_dirs = []

[compiler]
cxx_flags = []
